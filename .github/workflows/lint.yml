---
on:
  push:
  pull_request:
name: Test & Lint

env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  nix_build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31

      - name: Run flake checks
        run: nix flake check --print-build-logs

  clippy_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4f647fc679bcd3b11499ccb42104547c83dabe96 # stable
        with:
          toolchain: "1.85.0"
          components: clippy

      - name: Run Clippy
        uses: clechasseur/rs-clippy-check@9190480d27706dc2fd75d122753936cafafa2154 # v3
        with:
          args: --all-features
          toolchain: "1.85.0"
